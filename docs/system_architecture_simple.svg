<svg width="1440" height="900" viewBox="0 0 1440 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fbf5"/>
      <stop offset="1" stop-color="#fff6ec"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#17231d" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#31513d"/>
    </marker>
    <style>
      .title { font: 900 44px "Segoe UI", "Malgun Gothic", Arial, sans-serif; fill: #17231d; }
      .subtitle { font: 700 22px "Segoe UI", "Malgun Gothic", Arial, sans-serif; fill: #526158; }
      .label { font: 900 26px "Segoe UI", "Malgun Gothic", Arial, sans-serif; fill: #17231d; }
      .small { font: 700 18px "Segoe UI", "Malgun Gothic", Arial, sans-serif; fill: #5f6d64; }
      .icon { font: 54px "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif; }
      .card { stroke-width: 2; rx: 26; filter: url(#shadow); }
      .line { stroke: #31513d; stroke-width: 4; stroke-linecap: round; marker-end: url(#arrow); }
      .dash { stroke-dasharray: 10 10; }
    </style>
  </defs>

  <rect width="1440" height="900" fill="url(#bg)"/>
  <text x="720" y="72" text-anchor="middle" class="title">Manage Apple 시스템 아키텍처</text>
  <text x="720" y="112" text-anchor="middle" class="subtitle">UI · FastAPI · MariaDB · LLM · RAG · Robot 연동 구조</text>

  <!-- Center API -->
  <rect x="575" y="335" width="290" height="170" rx="28" fill="#eef7eb" stroke="#16713a" class="card"/>
  <text x="720" y="398" text-anchor="middle" class="icon">⚙️</text>
  <text x="720" y="448" text-anchor="middle" class="label">FastAPI</text>
  <text x="720" y="477" text-anchor="middle" class="small">API Gateway</text>

  <!-- UI -->
  <rect x="95" y="205" width="260" height="145" rx="26" fill="#eaf4ff" stroke="#3f78b5" class="card"/>
  <text x="225" y="260" text-anchor="middle" class="icon">🖥️</text>
  <text x="225" y="308" text-anchor="middle" class="label">관리자 UI</text>

  <rect x="95" y="505" width="260" height="145" rx="26" fill="#eaf4ff" stroke="#3f78b5" class="card"/>
  <text x="225" y="560" text-anchor="middle" class="icon">🛒</text>
  <text x="225" y="608" text-anchor="middle" class="label">쇼핑몰 UI</text>

  <!-- Data / AI -->
  <rect x="1085" y="205" width="260" height="145" rx="26" fill="#f6edff" stroke="#7d5bb7" class="card"/>
  <text x="1215" y="260" text-anchor="middle" class="icon">🗄️</text>
  <text x="1215" y="308" text-anchor="middle" class="label">MariaDB</text>

  <rect x="1085" y="505" width="260" height="145" rx="26" fill="#fff0ef" stroke="#c9281f" class="card"/>
  <text x="1215" y="560" text-anchor="middle" class="icon">🧠</text>
  <text x="1215" y="608" text-anchor="middle" class="label">LLM / Embedding</text>

  <!-- Sources -->
  <rect x="425" y="665" width="250" height="135" rx="24" fill="#fffbe8" stroke="#b59b26" class="card"/>
  <text x="550" y="716" text-anchor="middle" class="icon">📄</text>
  <text x="550" y="761" text-anchor="middle" class="label">RAG 문서</text>

  <rect x="765" y="665" width="250" height="135" rx="24" fill="#fff4e6" stroke="#d28b22" class="card"/>
  <text x="890" y="716" text-anchor="middle" class="icon">🌐</text>
  <text x="890" y="761" text-anchor="middle" class="label">가격 / 뉴스</text>

  <rect x="590" y="135" width="260" height="135" rx="24" fill="#fff4e6" stroke="#d28b22" class="card"/>
  <text x="720" y="185" text-anchor="middle" class="icon">🤖</text>
  <text x="720" y="231" text-anchor="middle" class="label">터틀봇 / 로봇팔</text>

  <!-- Main lines -->
  <line x1="355" y1="277" x2="575" y2="380" class="line"/>
  <line x1="355" y1="577" x2="575" y2="460" class="line"/>
  <line x1="720" y1="270" x2="720" y2="335" class="line"/>

  <line x1="865" y1="380" x2="1085" y2="277" class="line"/>
  <line x1="865" y1="460" x2="1085" y2="577" class="line"/>

  <line x1="610" y1="665" x2="680" y2="505" class="line"/>
  <line x1="850" y1="665" x2="760" y2="505" class="line"/>

  <!-- Response / store hints -->
  <path d="M1085 325 C1015 350 955 375 865 405" class="line dash"/>
  <path d="M1085 535 C1005 500 960 470 865 440" class="line dash"/>

  <!-- Legend -->
  <rect x="400" y="830" width="640" height="42" rx="21" fill="rgba(255,255,255,0.72)" stroke="#dce5dc"/>
  <text x="720" y="858" text-anchor="middle" class="small">무료: Ollama + 로컬 MariaDB · Pro: OpenAI API + 서버/컨테이너 MariaDB</text>
</svg>
